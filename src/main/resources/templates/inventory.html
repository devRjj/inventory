<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Emart Inventory</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
            overflow-x: hidden;
        }

        .hero {
            position: relative;
            height: 400px;
            background-image: url('https://pplx-res.cloudinary.com/image/upload/pplx_search_images/16c8bce25561dfd7c3e3de951f3c71b13e867676.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            animation: heroZoom 20s ease-in-out infinite alternate;
        }

        @keyframes heroZoom {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.4);
        }

        h2 {
            font-size: 3rem;
            margin: 0;
            z-index: 1;
            text-shadow: 0 4px 20px rgba(0,0,0,0.5);
            animation: fadeInDown 1.5s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border-radius: 20px;
            margin-top: -80px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            animation: slideUp 1s ease-out 0.5s both;
            position: relative;
            z-index: 10;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        table {
            border-collapse: collapse;
            width: 100%;
            background: white;
        }

        th {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 20px;
            text-align: left;
            font-weight: 600;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        th::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.5s;
        }

        th:hover::before {
            left: 100%;
        }

        td {
            padding: 20px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
        }

        tr {
            animation: fadeInUp 0.6s ease-out forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        tr:nth-child(1) { animation-delay: 0.2s; }
        tr:nth-child(2) { animation-delay: 0.4s; }
        tr:nth-child(3) { animation-delay: 0.6s; }
        tr:nth-child(4) { animation-delay: 0.8s; }
        tr:nth-child(5) { animation-delay: 1s; }
        tr:nth-child(6) { animation-delay: 1.2s; }
        tr:nth-child(7) { animation-delay: 1.4s; }
        tr:nth-child(8) { animation-delay: 1.6s; }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        tr:hover {
            background: rgba(79, 172, 254, 0.1);
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            z-index: 10;
        }

        tr:hover td {
            color: #4facfe;
            padding-left: 25px;
        }

        td:nth-child(1):hover {
            font-weight: 600;
        }

        .price {
            font-weight: 600;
            color: #27ae60;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero {
                height: 300px;
            }

            h2 {
                font-size: 2rem;
            }

            .container {
                margin-top: -60px;
                padding: 40px 20px;
                margin: -40px 20px 20px;
                border-radius: 0;
            }

            table, thead, tbody, th, td, tr {
                display: block;
            }

            thead tr {
                position: absolute;
                top: -9999px;
                left: -9999px;
            }

            tr {
                border: 1px solid #ccc;
                margin-bottom: 15px;
                border-radius: 10px;
                padding: 15px;
                background: rgba(255,255,255,0.9);
            }

            td {
                border: none;
                position: relative;
                padding-left: 50%;
                text-align: right;
                padding-right: 15px;
            }

            td:before {
                content: attr(data-label);
                position: absolute;
                left: 15px;
                width: 45%;
                font-weight: 600;
                color: #555;
            }
        }
    </style>
</head>

<body>

<div class="hero">
    <h2>Emart Inventory</h2>
</div>

<div class="container">
    <table>
        <tr>
            <th>Product</th>
            <th>Quantity</th>
            <th>Price</th>
        </tr>

        <tr th:each="item : ${items}" th:attr="data-index=${itemStat.index}">
            <td data-label="Product" th:text="${item.name}"></td>
            <td data-label="Quantity" th:text="${item.quantity}"></td>
            <td data-label="Price" th:text="${item.price}" class="price"></td>
        </tr>
    </table>
</div>
